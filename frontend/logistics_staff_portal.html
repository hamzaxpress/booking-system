<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogisticsPro - Staff Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0B0F1A;
      --navy-mid:  #111827;
      --navy-soft: #1F2937;
      --blue:      #0EA5A4;
      --blue-mid:  #0C8D8C;
      --blue-bright:#19C2C0;
      --sky:       #0F172A;
      --sky-mid:   #1E293B;
      --white:     #0B0F1A;
      --off-white: #0A0F1C;
      --border:    rgba(255,255,255,.08);
      --text:      #E5E7EB;
      --muted:     #9CA3AF;
      --success:   #14B8A6;
      --warning:   #F59E0B;
      --danger:    #EF4444;
      --gold:      #F6C453;
      --radius:    14px;
      --shadow:    0 10px 30px rgba(2,6,23,0.45);
      --shadow-lg: 0 18px 50px rgba(2,6,23,0.55);
    }

    body[data-theme="light"] {
      --navy:      #F7F9FC;
      --navy-mid:  #FFFFFF;
      --navy-soft: #F1F5F9;
      --blue:      #0EA5A4;
      --blue-mid:  #0C8D8C;
      --blue-bright:#0EA5A4;
      --sky:       #F3F6FB;
      --sky-mid:   #E2E8F0;
      --white:     #FFFFFF;
      --off-white: #F8FAFC;
      --border:    rgba(15,23,42,.12);
      --text:      #0B1220;
      --muted:     #64748B;
      --shadow:    0 10px 30px rgba(15,23,42,0.08);
      --shadow-lg: 0 18px 50px rgba(15,23,42,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'IBM Plex Sans', sans-serif;
      background: radial-gradient(900px 520px at 15% -10%, #0E1B2E 0%, #0B0F1A 55%, #070B14 100%);
      color: var(--text);
      direction: ltr;
    }
    body { color-scheme: dark; }

    body[data-theme="light"] {
      background: radial-gradient(900px 520px at 15% -10%, #E9F2FF 0%, #F7F9FC 55%, #FFFFFF 100%);
      color-scheme: light;
    }
    #app { min-height: 100vh; }

    /* ââ Scrollbar ââ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--sky); }
    ::-webkit-scrollbar-thumb { background: var(--blue-mid); border-radius: 4px; }

    /* ââ Typography ââ */
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .icon { width: 18px; height: 18px; display: block; }

    /* ââ Animations ââ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(1.4); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .anim-up  { animation: fadeUp  .45s ease both; }
    .anim-in  { animation: fadeIn  .3s  ease both; }
    .d1 { animation-delay: .05s; }
    .d2 { animation-delay: .12s; }
    .d3 { animation-delay: .19s; }
    .d4 { animation-delay: .26s; }
    .d5 { animation-delay: .33s; }

    /* ââ Buttons ââ */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: var(--radius);
      font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s; white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, #14B8A6 0%, #0EA5A4 100%); color: #0B0F1A; }
    .btn-primary:hover { background: linear-gradient(135deg, #19C2C0 0%, #14B8A6 100%); box-shadow: 0 6px 22px rgba(20,184,166,.35); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: #9FF3E9; border: 1.5px solid rgba(159,243,233,.35); }
    .btn-outline:hover { background: var(--sky); }
    body[data-theme="light"] .btn-outline { color: #0B1220; border-color: rgba(15,23,42,.25); }
    .btn-ghost  { background: transparent; color: var(--muted); }
    .btn-ghost:hover  { background: var(--sky); color: var(--blue); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    /* ââ Inputs ââ */
    .input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: rgba(8,12,22,.9);
      font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; color: var(--text);
      transition: border-color .2s, box-shadow .2s;
      direction: ltr;
      text-align: left;
      unicode-bidi: plaintext;
    }
    body[data-theme="light"] .input {
      background: #FFFFFF;
      color: #0B1220;
      border-color: rgba(15,23,42,.18);
      box-shadow: 0 1px 0 rgba(15,23,42,.04);
    }
    body[data-theme="light"] .input::placeholder { color: #94A3B8; }
    .input:focus { outline: none; border-color: var(--blue-bright); box-shadow: 0 0 0 3px rgba(20,184,166,.2); }
    .input::placeholder { color: var(--muted); }
    select.input { cursor: pointer; }
    body[data-theme="light"] select.input { background-color: #FFFFFF; }
    body[data-theme="light"] select.input option { background-color: #FFFFFF; color: #0B1220; }
    .input[type="email"],
    input[name="email"] {
      direction: ltr;
      text-align: left;
      unicode-bidi: bidi-override;
    }

    label { display: block; font-size: 13px; font-weight: 600; color: #C7D2E0; margin-bottom: 5px; }
    body[data-theme="light"] label { color: #334155; }

    /* ââ Cards ââ */
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,.72), rgba(10,15,28,.92));
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    body[data-theme="light"] .card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    /* ââ Status badges ââ */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 11px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600; letter-spacing: .3px;
    }
    body[data-theme="light"] .badge { color: #0B1220; }
    body[data-theme="light"] .badge { box-shadow: inset 0 0 0 1px rgba(15,23,42,.08); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

    /* ââ Table ââ */
    .table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    .table th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      background: rgba(15,23,42,.8); border-bottom: 1.5px solid var(--border); }
    body[data-theme="light"] .table th { background: #F1F5F9; }
    .table td { padding: 13px 14px; border-bottom: 1px solid rgba(255,255,255,.06); vertical-align: middle; }
    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td { background: rgba(20,184,166,.08); }
    body[data-theme="light"] .table td { border-bottom: 1px solid rgba(15,23,42,.08); }
    body[data-theme="light"] .table tr:hover td { background: #F1F5F9; }

    /* ââ Sidebar ââ */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 240px; height: 100vh;
      background: linear-gradient(180deg, #0A0F1C 0%, #0B1220 100%);
      border-right: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column;
      z-index: 100;
    }
    body[data-theme="light"] .sidebar {
      background: #FFFFFF;
      border-right: 1px solid var(--border);
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo .logo-mark {
      width: 38px; height: 38px; background: var(--blue);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff;
      margin-bottom: 10px;
    }
    .sidebar-logo .logo-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #fff; }
    .sidebar-logo .logo-sub {
      font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px;
    }
    body[data-theme="light"] .sidebar-logo .logo-name { color: #0B1220; }
    body[data-theme="light"] .sidebar-logo .logo-sub { color: #64748B; }
    .nav-section { padding: 16px 12px 4px; }
    .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,255,255,.3); padding: 0 8px; margin-bottom: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px; border-radius: 9px; cursor: pointer;
      color: rgba(255,255,255,.6); font-size: 13.5px; font-weight: 500;
      transition: all .18s; margin-bottom: 2px; border: none; background: none;
      width: 100%; text-align: left;
    }
    body[data-theme="light"] .nav-item { color: #475569; }
    .nav-item:hover  { background: rgba(255,255,255,.07); color: #fff; }
    body[data-theme="light"] .nav-item:hover { background: #F1F5F9; color: #0B1220; }
    .nav-item.active {
      background: rgba(20,184,166,.18);
      border: 1px solid rgba(20,184,166,.35);
      color: #fff; font-weight: 600;
      box-shadow: 0 8px 18px rgba(20,184,166,.18);
    }
    body[data-theme="light"] .nav-item.active {
      background: rgba(20,184,166,.12);
      color: #0B1220;
    }
    .nav-item .nav-icon {
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; color: rgba(255,255,255,.7);
    }
    .nav-item.active .nav-icon { color: #fff; }
    body[data-theme="light"] .nav-item .nav-icon { color: #64748B; }
    body[data-theme="light"] .nav-item.active .nav-icon { color: #0B1220; }
    .sidebar-footer {
      margin-top: auto; padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 9px;
      background: rgba(255,255,255,.06);
    }
    body[data-theme="light"] .user-chip { background: #F1F5F9; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: #fff;
      flex-shrink: 0;
    }
    .user-name  { font-size: 13px; font-weight: 600; color: #fff; }
    .user-role  { font-size: 11px; color: rgba(255,255,255,.4); text-transform: capitalize; }
    body[data-theme="light"] .user-name { color: #0B1220; }
    body[data-theme="light"] .user-role { color: #64748B; }

    /* ââ Main content ââ */
    .main-content { margin-left: 240px; min-height: 100vh; }
    .topbar {
      height: 60px; background: rgba(9,14,24,.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; position: sticky; top: 0; z-index: 50;
    }
    body[data-theme="light"] .topbar {
      background: rgba(255,255,255,.85);
    }
    body[data-theme="light"] .topbar span { color: #0B1220 !important; }
    .page-content { padding: 28px; background: transparent; }
    body[data-theme="light"] .page-content { background: #F7F9FC; }

    /* ââ Page header ââ */
    .page-header { margin-bottom: 24px; }
    .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; color: #E6F3FF; }
    .page-sub   { font-size: 14px; color: rgba(230,243,255,.7); margin-top: 3px; }
    body[data-theme="light"] .page-title { color: #0B1220; }
    body[data-theme="light"] .page-sub { color: #475569; }
    .page-actions { display: flex; gap: 10px; }

    /* ââ Stat cards ââ */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
    .stat-card { padding: 20px; }
    .stat-icon { width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; margin-bottom: 14px; border: 1px solid var(--border); background: var(--sky); }
    .stat-icon svg { width: 20px; height: 20px; }
    .stat-val  { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: #E6F3FF; }
    .stat-lbl  { font-size: 13px; color: rgba(230,243,255,.7); margin-top: 3px; }
    body[data-theme="light"] .stat-val { color: #0B1220; }
    body[data-theme="light"] .stat-lbl { color: #64748B; }
    .stat-change { font-size: 12px; font-weight: 600; margin-top: 6px; }

    /* ââ Form sections ââ */
    .form-section { margin-bottom: 28px; }
    .form-section-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
      color: #E6F3FF; padding: 0 0 10px;
      border-bottom: 1.5px solid rgba(230,243,255,.15); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    body[data-theme="light"] .form-section-title {
      color: #0B1220;
      border-bottom-color: rgba(15,23,42,.12);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .col-span-2 { grid-column: span 2; }
    .form-group { display: flex; flex-direction: column; }

    /* ââ Modal ââ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(11,31,58,.55);
      backdrop-filter: blur(4px); display: flex; align-items: center;
      justify-content: center; z-index: 200; animation: fadeIn .2s ease;
    }
    .modal {
      background: var(--white); border-radius: 16px; width: 480px;
      max-width: 94vw; box-shadow: var(--shadow-lg);
      animation: fadeUp .25s ease both;
    }
    body[data-theme="light"] .modal { background: #FFFFFF; color: #0B1220; }
    .modal-header {
      padding: 22px 24px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 700; }
    .modal-body  { padding: 24px; }
    .modal-footer{ padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px; }

    /* ââ Tracking timeline ââ */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 9px; top: 6px;
      bottom: 6px; width: 2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 20px; }
    .tl-dot  { position: absolute; left: -24px; top: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--white); box-shadow: 0 0 0 2px var(--blue); background: var(--blue); }
    .tl-dot.done { background: var(--success); box-shadow: 0 0 0 2px var(--success); }
    .tl-time { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .tl-label { font-size: 13.5px; font-weight: 600; color: #E5E7EB; }
    .tl-loc  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ââ Search bar ââ */
    .search-bar { position: relative; }
    .search-bar .input { padding-left: 38px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none; display: inline-flex; align-items: center; }
    .search-icon svg { width: 16px; height: 16px; }

    /* ââ Toast ââ */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--navy); color: #fff; border-radius: 10px;
      padding: 14px 20px; font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow-lg); z-index: 999;
      display: flex; align-items: center; gap: 10px;
      animation: fadeUp .3s ease;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    /* ââ Empty state ââ */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 14px; opacity: .4; }
    .empty-icon svg { width: 42px; height: 42px; }
    .empty-text  { font-size: 15px; font-weight: 500; }
    .empty-sub   { font-size: 13px; margin-top: 5px; opacity: .7; }

    /* ââ Loader ââ */
    .loader { display: flex; justify-content: center; padding: 60px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--sky-mid);
      border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ââ Login page ââ */
    .login-wrap { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .login-left {
      background: var(--navy); display: flex; flex-direction: column;
      justify-content: center; padding: 60px;
      background-image: linear-gradient(135deg, #0B1220 0%, #111827 100%);
      position: relative; overflow: hidden;
    }
    .login-left::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 320px; height: 320px; border-radius: 50%;
      background: rgba(33,150,243,.12); pointer-events: none;
    }
    .login-left::after {
      content: ''; position: absolute; bottom: -60px; left: -60px;
      width: 240px; height: 240px; border-radius: 50%;
      background: rgba(21,101,192,.18); pointer-events: none;
    }
    .login-right { display: flex; align-items: center; justify-content: center; padding: 40px; background: radial-gradient(800px 400px at 70% -10%, rgba(20,184,166,.18), rgba(7,11,20,1)); }
    .login-box   { width: 100%; max-width: 400px; }
    .login-logo  {
      width: 52px; height: 52px; background: var(--blue); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px;
      color: #fff; margin-bottom: 28px;
    }
    .login-title { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: #E5E7EB; margin-bottom: 6px; }
    .login-sub   { font-size: 14px; color: #9CA3AF; margin-bottom: 32px; }

    /* ââ Responsive ââ */
    @media (max-width: 900px) {
      .sidebar { width: 56px; overflow: hidden; }
      .sidebar .logo-name, .sidebar .logo-sub, .nav-item span:not(.nav-icon),
      .user-name, .user-role, .nav-label { display: none; }
      .main-content { margin-left: 56px; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
      .col-span-2 { grid-column: span 1; }
      .login-left { display: none; }
      .login-wrap { grid-template-columns: 1fr; }
    }
    @media (max-width: 580px) {
      .stat-grid { grid-template-columns: 1fr; }
      .page-content { padding: 16px; }
    }

      /* Copilot */
    .copilot-fab {
      position: fixed; right: 24px; bottom: 24px; z-index: 1200;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, #14B8A6 0%, #0EA5A4 100%);
      display: flex; align-items: center; justify-content: center;
      color: #0B0F1A; border: none; cursor: pointer;
      box-shadow: 0 10px 30px rgba(20,184,166,.35);
    }
    .copilot-drawer {
      position: fixed; right: -380px; bottom: 88px; z-index: 1199;
      width: 360px; max-width: calc(100vw - 32px); height: 420px;
      background: linear-gradient(180deg, rgba(17,24,39,.95), rgba(10,15,28,.98));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; box-shadow: var(--shadow-lg);
      transition: right .25s ease; display: flex; flex-direction: column;
    }
    .copilot-drawer.open { right: 24px; }
    .copilot-header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: space-between; }
    .copilot-title { font-family:'Space Grotesk',sans-serif; font-size: 14px; font-weight: 700; }
    .copilot-body { flex: 1; overflow: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
      .cp-msg { max-width: 85%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5;
        white-space: normal; overflow-wrap: anywhere; word-break: break-word; }
    .cp-user { align-self: flex-end; background: rgba(20,184,166,.18); border: 1px solid rgba(20,184,166,.35); }
    .cp-bot { align-self: flex-start; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); }

const THEME_KEY = 'lp_theme';
function applyTheme(mode) {

let LOCATION_DATA = {
  stateToCities: {},
  cityToState: {},
  stateIndex: {},
  cityIndex: {},
  states: [],
  allCities: [],
  ready: false,
};

async function loadLocationData() {
  try {
    const res = await fetch('./data/india_state_city.json', { cache: 'no-store' });
    const data = await res.json();
    const stateToCities = {};
    const cityToState = {};
    const stateIndex = {};
    const cityIndex = {};
    const states = [];
    const allCities = [];

    (data.states || []).forEach(s => {
      if (!s || !s.name || !Array.isArray(s.cities)) return;
      const stateName = s.name.trim();
      states.push(stateName);
      stateIndex[stateName.toLowerCase()] = stateName;
      const cleanCities = Array.from(
        new Set(s.cities.map(c => String(c).trim()).filter(Boolean))
      );
      stateToCities[stateName] = cleanCities;
      cleanCities.forEach(city => {
        const key = city.toLowerCase();
        if (!cityIndex[key]) cityIndex[key] = city;
        if (!cityToState[key]) cityToState[key] = stateName;
        allCities.push(city);
      });
    });
    const uniqueAll = Array.from(new Set(allCities));

    LOCATION_DATA = {
      stateToCities,
      cityToState,
      stateIndex,
      cityIndex,
      states,
      allCities: uniqueAll,
      ready: true,
    };
    setState({ locationReady: true });
  } catch (e) {
    console.error('Failed to load location data', e);
  }
}

function getCitiesForState(stateName) {
  return LOCATION_DATA.stateToCities[stateName] || [];
}

function getStateForCity(city) {
  if (!city) return '';
  const key = city.toLowerCase();
  return LOCATION_DATA.cityToState[key] || '';
}

function normalizeStateInput(value) {
  if (!value) return '';
  const key = value.toLowerCase();
  return LOCATION_DATA.stateIndex[key] || value;
}

function normalizeCityInput(value) {
  if (!value) return '';
  const key = value.toLowerCase();
  return LOCATION_DATA.cityIndex[key] || value;
}

function toDateOnly(dateStr) {
  if (!dateStr) return null;
  const iso = dateStr.includes('T') ? dateStr : dateStr.replace(' ', 'T');
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return null;
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function filterShipmentsByDays(shipments, days) {
  if (!days || !Array.isArray(shipments)) return shipments || [];
  const today = new Date();
  const end = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const start = new Date(end);
  start.setDate(start.getDate() - (days - 1));
  return shipments.filter(s => {
    const raw = s.created_at || s.booking_date || '';
    const d = toDateOnly(raw);
    if (!d) return false;
    return d >= start && d <= end;
  });
}

function validateBookingLocations() {
  if (!LOCATION_DATA.ready) return true;
  const f = state.bookingForm || {};
  const pairs = [
    { state: f.s_state, city: f.s_city, label: 'Sender' },
    { state: f.r_state, city: f.r_city, label: 'Receiver' },
  ];
  for (const p of pairs) {
    const stateName = normalizeStateInput(p.state || '');
    const cityName = normalizeCityInput(p.city || '');
    if (!stateName || !cityName) continue;
    const cities = getCitiesForState(stateName);
    if (!cities.includes(cityName)) {
      showToast(`${p.label} city does not match state`, 'error');
      return false;
    }
  }
  const sState = normalizeStateInput(f.s_state || '');
  const rState = normalizeStateInput(f.r_state || '');
  const sCity = normalizeCityInput(f.s_city || '');
  const rCity = normalizeCityInput(f.r_city || '');
  if (sState && rState && sCity && rCity && sState === rState && sCity === rCity) {
    const sAddr = String(f.s_address || '').trim().toLowerCase().replace(/\s+/g, ' ');
    const rAddr = String(f.r_address || '').trim().toLowerCase().replace(/\s+/g, ' ');
    if (sAddr && rAddr && sAddr === rAddr) {
      showToast('Sender and receiver address must be different for same city/state', 'error');
      return false;
    }
  }
  return true;
}

function updateCityOptions(prefix) {
  const stateKey = `${prefix}_state`;
  const cityKey = `${prefix}_city`;
  const stateVal = state.bookingForm[stateKey] || '';
  const datalist = document.getElementById(`${prefix}-city-list`);
  const input = document.querySelector(`input[name="${cityKey}"]`);
  if (!datalist || !input) return;

  const query = (input.value || '').trim().toLowerCase();
  const baseCities = stateVal ? getCitiesForState(stateVal) : LOCATION_DATA.allCities;
  let filtered = baseCities;
  if (query) {
    filtered = baseCities.filter(c => c.toLowerCase().includes(query));

  const limit = 200;
  const options = filtered.slice(0, limit).map(c => `<option value="${c}"></option>`).join('');
  datalist.innerHTML = options;
}

function handleLocationFocus(e, kind, prefix) {

function captureFocus() {
  const el = document.activeElement;
  if (!el) return null;
  const tag = el.tagName;
  if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return null;
  return {
    id: el.id || null,
    name: el.getAttribute('name') || null,
    focusKey: el.getAttribute('data-focus-key') || null,
    type: el.type || null,
    selectionStart: el.selectionStart,
    selectionEnd: el.selectionEnd,
  };
}

function restoreFocus(focus) {
  if (!focus) return;
  let el = null;
  if (focus.focusKey) el = document.querySelector(`[data-focus-key="${focus.focusKey}"]`);
  if (focus.id) el = document.getElementById(focus.id);
  if (!el && focus.name) el = document.querySelector(`[name="${focus.name}"]`);
  if (!el) return;
  el.focus();
  if (typeof el.setSelectionRange === 'function' && focus.selectionStart != null) {
    try { el.setSelectionRange(focus.selectionStart, focus.selectionEnd); } catch {}
  }
}

let renderQueued = false;
function scheduleRender(focus) {
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => {
    renderQueued = false;
    render();
    requestAnimationFrame(() => restoreFocus(focus));
  });
}

function setState(patch) {
  const focus = captureFocus();
  state = { ...state, ...patch };
  if (shouldRenderOverlaysOnly(patch)) {
    renderOverlaysOnly();
    return;
  }
  scheduleRender(focus);
}

function shouldRenderOverlaysOnly(patch) {
  const keys = Object.keys(patch || {});
  if (keys.length === 0) return false;
  return keys.every(k => k === 'modal' || k === 'toast');
}

async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  try {
    const res = await fetch(API + path, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
    return data;
  } catch (e) {
    throw e;
  }
}

async function loadShipments() {
  setState({ loading: true });
  try {
    const { search, status } = state.filters;
    let url = `/shipments?page=${state.pagination.page}&size=${state.pagination.size}`;
    if (status) url += `&status_code=${status}`;
    const data = await api('GET', url);
    let items = data.items || [];
    if (search) {
      const q = search.toLowerCase();
      items = items.filter(s =>
        s.docket_number.toLowerCase().includes(q) ||
        s.sender?.full_name?.toLowerCase().includes(q) ||
        s.receiver?.full_name?.toLowerCase().includes(q)
      );
    }
    setState({ shipments: items, loading: false, pagination: { ...state.pagination, total: data.total } });
  } catch (e) { setState({ loading: false }); showToast(e.message, 'error'); }
}

        full_name: form.s_name, phone: form.s_phone,
        address_line: form.s_address, city: form.s_city,

      weight_kg: parseFloat(form.weight_kg),

    const result = await api('POST', '/shipments', payload);

    await loadShipments();
    showToast(`Shipment booked! Docket: ${result.docket_number}`);
  } catch (e) { setState({ loading: false }); showToast(e.message, 'error'); }
}

async function updateStatus(shipmentId, form) {
  setState({ loading: true });

    await api('PUT', `/shipments/${shipmentId}/status`, {
      status_code: form.status_code,
      location: form.location || null,

    } else {

      <div class="stat-val">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
      <div class="stat-change" style="color:${s.ic}">${s.change}</div>
    </div>`).join('')}
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">
    <div class="card anim-up d3">
      <div style="padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">

        </tr></thead>
        <tbody>
          ${recent.map(s => `
          <tr style="cursor:pointer" onclick="openDetail(${JSON.stringify(s).replace(/"/g,'&quot;')})">

            <td>${s.receiver?.full_name || '-'}</td>

            <div class="form-group">

function renderDetailModal(s) {

  return `

          <div class="modal-title">Shipment Details</div>

        <div style="display:flex;gap:8px;align-items:center">

        <div style="background:var(--off-white);border-radius:10px;padding:14px;margin-bottom:20px">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center">
            ${[
              ['Type', s.shipment_type],
              ['Weight', `${s.weight_kg} kg`],
              ['Freight', `INR ${s.freight_charge?.toFixed(2)||0}`],
              ['Total', `INR ${s.total_amount?.toFixed(2)||0}`],
            ].map(([l,v])=>`
            <div>
              <div style="font-size:11px;color:var(--muted);font-weight:600">${l}</div>
              <div style="font-weight:700;color:var(--navy);margin-top:3px">${v}</div>
            </div>`).join('')}
          </div>
        </div>

        ${history.length > 0 ? `
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:14px">TRACKING TIMELINE</div>
          <div class="timeline">
            ${history.slice().reverse().map((h,i) => `
            <div class="tl-item">
              <div class="tl-dot ${i===0?'':'done'}"></div>
              <div class="tl-time">${formatDateTime(h.event_time)}</div>
              <div class="tl-label">${h.status?.label || h.status?.code || '-'}</div>
              ${h.location ? `<div class="tl-loc"><span style="display:inline-block;width:14px;height:14px;vertical-align:-2px;color:var(--muted)">${icon('pin')}</span> ${h.location}</div>` : ''}
              ${h.remarks  ? `<div class="tl-loc" style="font-style:italic">${h.remarks}</div>` : ''}
            </div>`).join('')}
          </div>
        </div>` : ''}
      </div>
      <div class="modal-footer">
        ${!s.status?.is_terminal ? `
          <button class="btn btn-primary" type="button" onclick="closeModal();openUpdate(${JSON.stringify(s).replace(/"/g,'&quot;')})">
            Update Status
          </button>` : ''}
        <button class="btn btn-outline" type="button" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>`;
}

function renderOverlays() {
  let modalHtml = '';
  if (state.modal?.type === 'detail') modalHtml = renderDetailModal(state.modal.shipment);
  if (state.modal?.type === 'update') modalHtml = renderUpdateModal(state.modal.shipment);

  const toastHtml = state.toast ? `
  <div class="toast ${state.toast.type}">
    ${state.toast.type === 'success' ? 'OK' : 'ERR'} ${state.toast.msg}
  </div>` : '';

  return { modalHtml, toastHtml };
}

function renderOverlaysOnly() {
  const modalRoot = document.getElementById('modal-root');
  const toastRoot = document.getElementById('toast-root');
  if (!modalRoot || !toastRoot) {
    render();
    return;
  }
  const { modalHtml, toastHtml } = renderOverlays();
  modalRoot.innerHTML = modalHtml;
  toastRoot.innerHTML = toastHtml;
}

function render() {
  const root = document.getElementById('app');
  if (!state.token || !state.user) {
    root.innerHTML = renderLogin();
    return;
  }

  let pageHtml = '';
  if (state.page === 'dashboard')  pageHtml = renderDashboard();
  else if (state.page === 'book')  pageHtml = renderBookingForm();
  else if (state.page === 'shipments') pageHtml = renderShipments();
  else if (state.page === 'users') pageHtml = renderUsers();

  const { modalHtml, toastHtml } = renderOverlays();

  root.innerHTML = `
    ${renderSidebar()}
    <div class="main-content">
      ${renderTopbar()}
      <div class="page-content">${pageHtml}</div>
    </div>
    <div id="modal-root">${modalHtml}</div>
    <div id="toast-root">${toastHtml}</div>
    ${renderCopilot()}
  `;
  if (state.page === 'dashboard') {
    const ships = state.shipments || [];
    requestAnimationFrame(() => {
      if (typeof renderAdminAnalyticsSection === 'function' && state.user?.role === 'admin') {
        renderAdminAnalyticsSection(ships);
      }
      if (typeof renderStaffOperationsSection === 'function') {
        renderStaffOperationsSection(ships);
      }
    });
  }
  if (state.page === 'book') {
    updatePricingPreview();
    updateCityOptions('s');
    updateCityOptions('r');
  }
}

window.sendCopilot = async function() {

      setState({ copilotMessages: [...nextMessages, { role: 'bot', text: answer }], copilotLoading: false });

window.updateBookingField = function(e) {
  const name = e.target.name;
  const rawValue = e.target.value;
  const value = (name === 's_email' || name === 'r_email')
    ? normalizeEmailInput(rawValue)
    : rawValue;

  if (name === 's_state' || name === 'r_state') {
    const cityKey = name === 's_state' ? 's_city' : 'r_city';
    const prefix = name === 's_state' ? 's' : 'r';
    const normalized = normalizeStateInput(value);
    const cities = getCitiesForState(normalized);
    const next = { ...state.bookingForm, [name]: normalized };
    if (next[cityKey] && !cities.includes(next[cityKey])) {
      next[cityKey] = '';
    }
    state.bookingForm = next;
    if (normalized && normalized !== value) {
      const stateInput = document.querySelector(`input[name="${name}"]`);
      if (stateInput) stateInput.value = normalized;
    }
    updateCityOptions(prefix);
    return;
  }

  if (name === 's_city' || name === 'r_city') {
    const stateKey = name === 's_city' ? 's_state' : 'r_state';
    const prefix = name === 's_city' ? 's' : 'r';
    const normalizedCity = normalizeCityInput(value);
    const next = { ...state.bookingForm, [name]: normalizedCity };
    const inferred = getStateForCity(normalizedCity);
    if (inferred) next[stateKey] = inferred;
    state.bookingForm = next;
    if (inferred) {
      const stateInput = document.querySelector(`input[name="${stateKey}"]`);
      if (stateInput) stateInput.value = inferred;
    }
    if (normalizedCity && normalizedCity !== value) {
      const cityInput = document.querySelector(`input[name="${name}"]`);
      if (cityInput) cityInput.value = normalizedCity;
    }
    updateCityOptions(prefix);
    return;
  }

  state.bookingForm = { ...state.bookingForm, [name]: value };
  updatePricingPreview();
};

function updatePricingPreview() {
  if (state.page !== 'book') return;
  const f = state.bookingForm || {};
  const preview = document.getElementById('price-preview');
  if (!preview) return;
  if (!f.weight_kg || !f.shipment_type) {
    preview.style.display = 'none';
    return;
  }
  const rates = { standard: 40, express: 80, overnight: 150, cargo: 25 };
  const mins  = { standard: 60, express: 120, overnight: 250, cargo: 200 };
  const r = rates[f.shipment_type] || 40;
  const m = mins[f.shipment_type] || 60;
  const freight = Math.max(parseFloat(f.weight_kg || 0) * r, m);
  const tax = freight * 0.18;
  const total = freight + tax;
  preview.style.display = '';
  const freightEl = document.getElementById('price-freight');
  const taxEl = document.getElementById('price-tax');
  const totalEl = document.getElementById('price-total');
  if (freightEl) freightEl.textContent = `INR ${freight.toFixed(2)}`;
  if (taxEl) taxEl.textContent = `INR ${tax.toFixed(2)}`;
  if (totalEl) totalEl.textContent = `INR ${total.toFixed(2)}`;
}

function getTimeOfDay() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}

function formatDateTime(str) {
  if (!str) return '-';
  try {
    return new Date(str + ' UTC').toLocaleString('en-IN', {
      dateStyle: 'medium', timeStyle: 'short',
    });
  } catch { return str; }
}

/**
 * admin_charts.js - Business Analytics for Admin Dashboard
 * ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
 * Renders three Chart.js charts using shipment data already
 * loaded by the portal. Called after renderDashboard() when
 * the logged-in user has role === 'admin'.
 *
 * Charts:
 *  1. Shipments by Status   - Doughnut / Pie chart
 *  2. Shipments Per Day     - Line chart (last 14 days)
 *  3. City Distribution     - Horizontal bar chart (origin city)
 *
 * No new API calls are made; data comes from state.shipments
 * which is already populated by loadDashboard().
 */

// ââ Chart instance registry (so we can destroy before re-draw) ââââââââââââââ
window._adminCharts = window._adminCharts || {};

// ââ Color palette matching the portal's CSS variables âââââââââââââââââââââââ
const AC_COLORS = {
  blue:    '#0EA5A4',
  blueMid: '#14B8A6',
  bright:  '#22D3EE',
  teal:    '#2DD4BF',
  green:   '#34D399',
  orange:  '#F59E0B',
  slate:   '#9CA3AF',
  sky:     '#1F2937',
};

const STATUS_PALETTE = {
  BOOKED:             '#1976D2',
  PICKUP_SCHEDULED:   '#8B5CF6',
  PICKED_UP:          '#F59E0B',
  AT_ORIGIN_HUB:      '#F97316',
  IN_TRANSIT:         '#06B6D4',
  AT_DESTINATION_HUB: '#6366F1',
  OUT_FOR_DELIVERY:   '#10B981',
  DELIVERED:          '#22C55E',
  DELIVERY_ATTEMPTED: '#EAB308',
  RETURNED_TO_HUB:    '#F87171',
  LOST:               '#EF4444',
  CANCELLED:          '#94A3B8',

};

// ââ Chart.js global defaults âââââââââââââââââââââââââââââââââââââââââââââââââ
function _setChartDefaults() {
  if (!window.Chart) return;
  Chart.defaults.font.family = "'DM Sans', sans-serif";
  Chart.defaults.font.size   = 12;
  Chart.defaults.color       = '#5C7FA3';
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.padding = 16;
  Chart.defaults.plugins.tooltip.backgroundColor = '#0B1F3A';
  Chart.defaults.plugins.tooltip.titleColor      = '#FFFFFF';
  Chart.defaults.plugins.tooltip.bodyColor       = '#BBDEFB';
  Chart.defaults.plugins.tooltip.padding         = 12;
  Chart.defaults.plugins.tooltip.cornerRadius    = 8;
}

// ââ Helper: destroy existing chart instance safely ââââââââââââââââââââââââââ
function _destroyChart(key) {
  if (window._adminCharts[key]) {
    try { window._adminCharts[key].destroy(); } catch(_) {}
    delete window._adminCharts[key];
  }
}

// ââ 1. Shipments by Status - Doughnut âââââââââââââââââââââââââââââââââââââââ
function renderAdminStatusPieChart(shipments) {
  const canvas = document.getElementById('adminStatusPie');
  if (!canvas || !window.Chart) return;
  _destroyChart('statusPie');

  // Count by status code
  const counts = {};
  shipments.forEach(s => {
    const code = s.status?.code || 'UNKNOWN';
    counts[code] = (counts[code] || 0) + 1;
  });

  // Only include statuses with at least one shipment
  const entries = Object.entries(counts).filter(([,v]) => v > 0);
  if (entries.length === 0) {
    canvas.parentElement.querySelector('.chart-empty')?.remove();
    canvas.insertAdjacentHTML('afterend', '<p class="chart-empty" style="text-align:center;color:#5C7FA3;padding:24px 0;font-size:13px">No shipment data yet</p>');
    return;
  }

  const labels = entries.map(([code]) => {
    // Convert SNAKE_CASE to Title Case
    return code.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  });
  const data   = entries.map(([,v]) => v);
  const colors = entries.map(([code]) => STATUS_PALETTE[code] || AC_COLORS.slate);

  _setChartDefaults();
  window._adminCharts.statusPie = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: '#FFFFFF',
        borderWidth: 3,
        hoverOffset: 8,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'right',
          labels: { boxWidth: 12, font: { size: 11 } },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
              const pct   = total ? Math.round(ctx.parsed / total * 100) : 0;
              return `  ${ctx.label}: ${ctx.parsed} (${pct}%)`;
            },
          },
        },
      },
    },
  });
}

// ââ 2. Shipments Per Day - Line chart (last 14 days) ââââââââââââââââââââââââ
function renderAdminDailyLineChart(shipments, days = 14) {
  const canvas = document.getElementById('adminDailyLine');
  if (!canvas || !window.Chart) return;
  _destroyChart('dailyLine');

  // Build last N days date labels
  const today  = new Date();
  const labels = [];
  const dateKeys = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = d.toISOString().slice(0, 10); // YYYY-MM-DD
    dateKeys.push(key);
    labels.push(d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
  }

  // Count shipments per day using created_at or booking_date
  const dayCounts = {};
  dateKeys.forEach(k => dayCounts[k] = 0);
  shipments.forEach(s => {
    const raw = s.created_at || s.booking_date || '';
    if (!raw) return;
    const dayKey = raw.slice(0, 10);
    if (dayKey in dayCounts) dayCounts[dayKey]++;
  });

  const data = dateKeys.map(k => dayCounts[k]);

  _setChartDefaults();
  window._adminCharts.dailyLine = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Shipments Booked',
        data,
        borderColor:     AC_COLORS.blue,
        backgroundColor: 'rgba(21,101,192,0.10)',
        borderWidth: 2.5,
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: AC_COLORS.blueMid,
        pointBorderColor: '#FFFFFF',
        pointBorderWidth: 2,
        fill: true,
        tension: 0.4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => `  Shipments: ${ctx.parsed.y}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#D0E4F7', lineWidth: 1 },
          ticks: { maxTicksLimit: 7, font: { size: 11 } },
        },
        y: {
          beginAtZero: true,
          grid: { color: '#D0E4F7' },
          ticks: {
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : null,
          },
        },
      },
    },
  });
}

// ââ 3. City Distribution - Horizontal Bar chart ââââââââââââââââââââââââââââââ
function renderAdminCityBarChart(shipments) {
  const canvas = document.getElementById('adminCityBar');
  if (!canvas || !window.Chart) return;
  _destroyChart('cityBar');

  // Count by origin (sender) city
  const cityCounts = {};
  shipments.forEach(s => {
    const city = s.sender?.city?.trim() || 'Unknown';
    cityCounts[city] = (cityCounts[city] || 0) + 1;
  });

  // Sort descending, cap at top 10
  const sorted = Object.entries(cityCounts)
    .sort(([,a],[,b]) => b - a)
    .slice(0, 10);

  if (sorted.length === 0) return;

  const labels = sorted.map(([city]) => city);
  const data   = sorted.map(([,v]) => v);

  // Gradient color array from dark-blue to light-blue
  const barColors = data.map((_, i) => {
    const t = i / Math.max(data.length - 1, 1);
    const r = Math.round(21  + t * (33  - 21));
    const g = Math.round(101 + t * (150 - 101));
    const b = Math.round(192 + t * (243 - 192));
    return `rgba(${r},${g},${b},0.85)`;
  });

  _setChartDefaults();
  window._adminCharts.cityBar = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Shipments',
        data,
        backgroundColor: barColors,
        borderColor:     barColors.map(c => c.replace('0.85','1')),
        borderWidth: 1.5,
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      indexAxis: 'y',   // horizontal
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `  Shipments: ${ctx.parsed.x}`,
          },
        },
      },
      scales: {
        x: {
          beginAtZero: true,
          grid: { color: '#D0E4F7' },
          ticks: {
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : null,
          },
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 11 } },
        },
      },
    },
  });
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// OPERATIONS OVERVIEW - staff_charts.js (inlined)
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
/**
 * staff_charts.js - Operations Overview for Staff Dashboard
 * ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
 * Renders three Chart.js charts using shipment data already
 * loaded by the portal. Called after renderDashboard() for
 * users with role === 'staff' (and also admins if desired).
 *
 * Charts:
 *  1. Today's Shipments    - Vertical bar chart (hourly)
 *  2. Status Breakdown     - Pie / Doughnut chart
 *  3. Weekly Activity      - Line chart (last 7 days)
 *
 * No new API calls are made; data comes from state.shipments.
 */

// ââ Chart instance registry ââââââââââââââââââââââââââââââââââââââââââââââââââ
window._staffCharts = window._staffCharts || {};

// ââ Color palette ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
const SC_COLORS = {
  blue:   '#0EA5A4',
  mid:    '#14B8A6',
  bright: '#22D3EE',
  teal:   '#2DD4BF',
  green:  '#34D399',
  orange: '#F59E0B',
  slate:  '#9CA3AF',
  sky:    '#1F2937',
};

const SC_STATUS_PALETTE = {
  BOOKED:             '#1976D2',
  PICKUP_SCHEDULED:   '#8B5CF6',
  PICKED_UP:          '#F59E0B',
  AT_ORIGIN_HUB:      '#F97316',
  IN_TRANSIT:         '#06B6D4',
  AT_DESTINATION_HUB: '#6366F1',
  OUT_FOR_DELIVERY:   '#10B981',
  DELIVERED:          '#22C55E',
  DELIVERY_ATTEMPTED: '#EAB308',
  RETURNED_TO_HUB:    '#F87171',
  LOST:               '#EF4444',
  CANCELLED:          '#94A3B8',
  DAMAGED:            '#DC2626',
};

// ââ Helper: destroy chart safely âââââââââââââââââââââââââââââââââââââââââââââ
function _destroyStaffChart(key) {
  if (window._staffCharts[key]) {
    try { window._staffCharts[key].destroy(); } catch(_) {}
    delete window._staffCharts[key];
  }
}

// ââ Chart.js global defaults (safe to call multiple times) âââââââââââââââââââ
function _setStaffChartDefaults() {
  if (!window.Chart) return;
  Chart.defaults.font.family = "'DM Sans', sans-serif";
  Chart.defaults.font.size   = 12;
  Chart.defaults.color       = '#5C7FA3';
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.padding = 16;
  Chart.defaults.plugins.tooltip.backgroundColor = '#0B1F3A';
  Chart.defaults.plugins.tooltip.titleColor      = '#FFFFFF';
  Chart.defaults.plugins.tooltip.bodyColor       = '#BBDEFB';
  Chart.defaults.plugins.tooltip.padding         = 12;
  Chart.defaults.plugins.tooltip.cornerRadius    = 8;
}

// ââ 1. Today's Shipments - Hourly Bar chart ââââââââââââââââââââââââââââââââââ
function renderStaffTodayBarChart(shipments) {
  const canvas = document.getElementById('staffTodayBar');
  if (!canvas || !window.Chart) return;
  _destroyStaffChart('todayBar');

  const todayStr = new Date().toISOString().slice(0, 10);

  // Bucket into 4-hour slots: 00-04, 04-08, ..., 20-24
  const slots    = ['12am-4am','4am-8am','8am-12pm','12pm-4pm','4pm-8pm','8pm-12am'];
  const slotData = new Array(6).fill(0);

  shipments.forEach(s => {
    const raw = s.created_at || s.booking_date || '';
    if (!raw || !raw.startsWith(todayStr)) return;
    // Parse hour from ISO string (UTC stored, display as-is)
    const timeStr = raw.slice(11, 13);
    const hour    = parseInt(timeStr, 10) || 0;
    const slot    = Math.floor(hour / 4);
    if (slot >= 0 && slot < 6) slotData[slot]++;
  });

  const total = slotData.reduce((a,b) => a+b, 0);

  _setStaffChartDefaults();
  window._staffCharts.todayBar = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: slots,
      datasets: [{
        label: "Today's Shipments",
        data: slotData,
        backgroundColor: slotData.map(v =>
          v > 0 ? 'rgba(21,101,192,0.80)' : 'rgba(208,228,247,0.6)'
        ),
        borderColor: slotData.map(v =>
          v > 0 ? SC_COLORS.blue : SC_COLORS.sky
        ),
        borderWidth: 1.5,
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: {
          display: total === 0,
          text: 'No shipments booked today yet',
          color: SC_COLORS.slate,
          font: { size: 12 },
        },
        tooltip: {
          callbacks: {
            label: ctx => `  Shipments: ${ctx.parsed.y}`,
          },
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 } },
        },
        y: {
          beginAtZero: true,
          grid: { color: '#D0E4F7' },
          ticks: {
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : null,
          },
        },
      },
    },
  });
}

// ââ 2. Status Breakdown - Doughnut âââââââââââââââââââââââââââââââââââââââââââ
function renderStaffStatusPieChart(shipments) {
  const canvas = document.getElementById('staffStatusPie');
  if (!canvas || !window.Chart) return;
  _destroyStaffChart('statusPie');

  const counts = {};
  shipments.forEach(s => {
    const code = s.status?.code || 'UNKNOWN';
    counts[code] = (counts[code] || 0) + 1;
  });

  const entries = Object.entries(counts).filter(([,v]) => v > 0);
  if (entries.length === 0) return;

  const labels = entries.map(([code]) =>
    code.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
  );
  const data   = entries.map(([,v]) => v);
  const colors = entries.map(([code]) => SC_STATUS_PALETTE[code] || SC_COLORS.slate);

  _setStaffChartDefaults();
  window._staffCharts.statusPie = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: '#FFFFFF',
        borderWidth: 3,
        hoverOffset: 8,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { boxWidth: 12, font: { size: 10 }, padding: 10 },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
              const pct   = total ? Math.round(ctx.parsed / total * 100) : 0;
              return `  ${ctx.label}: ${ctx.parsed} (${pct}%)`;
            },
          },
        },
      },
    },
  });
}

// ââ 3. Weekly Activity - Line chart âââââââââââââââââââââââââââââââââââââââââ
function renderStaffWeeklyLineChart(shipments, days = 7) {
  const canvas = document.getElementById('staffWeeklyLine');
  if (!canvas || !window.Chart) return;
  _destroyStaffChart('weeklyLine');

  const today   = new Date();
  const labels  = [];
  const dateKeys = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dateKeys.push(d.toISOString().slice(0, 10));
    labels.push(d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
  }

  const dayCounts = {};
  dateKeys.forEach(k => dayCounts[k] = 0);
  shipments.forEach(s => {
    const raw = s.created_at || s.booking_date || '';
    const key = raw.slice(0, 10);
    if (key in dayCounts) dayCounts[key]++;
  });

  const data = dateKeys.map(k => dayCounts[k]);

  // Two datasets: bookings + (simulated) delivered count from 'DELIVERED' status
  const deliveredCounts = {};
  dateKeys.forEach(k => deliveredCounts[k] = 0);
  // We don't have per-day delivered info without event timestamps, so skip
  // and just show total booked per day

  _setStaffChartDefaults();
  window._staffCharts.weeklyLine = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Booked',
        data,
        borderColor:     SC_COLORS.blue,
        backgroundColor: 'rgba(21,101,192,0.10)',
        borderWidth: 2.5,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: SC_COLORS.mid,
        pointBorderColor: '#FFFFFF',
        pointBorderWidth: 2,
        fill: true,
        tension: 0.35,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => `  Bookings: ${ctx.parsed.y}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#D0E4F7' },
          ticks: { font: { size: 11 } },
        },
        y: {
          beginAtZero: true,
          grid: { color: '#D0E4F7' },
          ticks: {
            stepSize: 1,
            callback: v => Number.isInteger(v) ? v : null,
          },
        },
      },
    },
  });
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// BOOT
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
(async function boot() {
  if (state.token) {
    try {
      const user = await api('GET', '/auth/me');
      setState({ user, page: 'dashboard' });
      loadDashboard();
    } catch {
      localStorage.removeItem('lp_token');
      setState({ token: null, page: 'login' });
    }
  } else {
    render();
  }
})();
</script>
