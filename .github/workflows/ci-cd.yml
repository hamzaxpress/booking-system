name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Compile check
        run: python -m compileall backend

      # Enable later if tests exist
      # - name: Run tests
      #   run: python -m pytest -q


  frontend:
    name: Frontend (Static)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check
        run: |
          node -e "
          const fs=require('fs');
          const path=require('path');
          const dir='frontend';
          for (const f of fs.readdirSync(dir)) {
            if (f.endsWith('.js')) {
              const code=fs.readFileSync(path.join(dir,f),'utf8');
              new Function(code);
              console.log('OK', f);
            }
          }"

      - name: HTML presence check
        run: |
          ls -la frontend/*.html


  deploy:
    name: Deploy (EC2)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          timeout: 30m
          command_timeout: 30m
          request_pty: false

          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Checking Python..."
            if ! command -v python3 >/dev/null 2>&1; then
              echo "Python3 not found"
              exit 1
            fi

            echo "Setting up virtual environment..."
            if [ ! -d ".venv" ]; then
              sudo apt-get update
              sudo apt-get install -y python3-venv python3-pip
              python3 -m venv .venv
            fi

            source .venv/bin/activate

            echo "Checking dependency changes..."
            REQ_HASH_FILE=".venv/requirements.sha256"
            NEW_HASH="$(sha256sum backend/requirements.txt | awk '{print $1}')"

            if [ ! -f "$REQ_HASH_FILE" ] || [ "$(cat "$REQ_HASH_FILE")" != "$NEW_HASH" ]; then
              echo "Installing dependencies..."
              pip install -q -r backend/requirements.txt
              echo "$NEW_HASH" > "$REQ_HASH_FILE"
            else
              echo "Dependencies unchanged"
            fi

            echo "Restarting FastAPI..."

            if pgrep -f "uvicorn app.main:app" > /dev/null; then
              pkill -f "uvicorn app.main:app"
              sleep 2
            fi

            nohup .venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8000 \
              > backend.log 2>&1 &

            echo "Restarting frontend server..."

            if pgrep -f "http.server 5500" > /dev/null; then
              pkill -f "http.server 5500"
              sleep 2
            fi

            nohup python3 -m http.server 5500 \
              --directory frontend \
              > frontend.log 2>&1 &

            echo "Deployment finished successfully."
