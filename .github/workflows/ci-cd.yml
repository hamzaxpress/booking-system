name: Deploy Logistics

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (EC2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare frontend (static)
        run: |
          test -f frontend/logistics_staff_portal.html
          test -f frontend/logistics_tracking_page.html

      - name: Upload frontend folder (keep structure)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "frontend"
          target: "${{ secrets.DEPLOY_PATH }}/_frontend_upload"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            BUILD_FRONTEND="$APP_DIR/_frontend_upload/frontend"
            APP_FRONTEND="$APP_DIR/frontend"
            VENV="$APP_DIR/.venv"

            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main

            if ! command -v python3 >/dev/null 2>&1; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-venv python3-pip
            fi

            if [ ! -d "$VENV" ]; then
              python3 -m venv "$VENV"
            fi
            source "$VENV/bin/activate"

            REQ_HASH_FILE="$VENV/requirements.sha256"
            NEW_HASH="$(sha256sum backend/requirements.txt | awk '{print $1}')"
            if [ ! -f "$REQ_HASH_FILE" ] || [ "$(cat "$REQ_HASH_FILE")" != "$NEW_HASH" ]; then
              pip install -q -r backend/requirements.txt
              echo "$NEW_HASH" > "$REQ_HASH_FILE"
            fi

            test -f "$BUILD_FRONTEND/logistics_staff_portal.html"
            test -f "$BUILD_FRONTEND/logistics_tracking_page.html"

            mkdir -p "$APP_FRONTEND"
            rsync -a --delete "$BUILD_FRONTEND/" "$APP_FRONTEND/"

            pkill -f "uvicorn app.main:app" || true
            setsid "$VENV/bin/uvicorn" app.main:app --host 0.0.0.0 --port 8000 > "$APP_DIR/backend.log" 2>&1 < /dev/null &

            pkill -f "python3 -m http.server 5500" || true
            setsid python3 -m http.server 5500 --directory "$APP_FRONTEND" > "$APP_DIR/frontend.log" 2>&1 < /dev/null &
