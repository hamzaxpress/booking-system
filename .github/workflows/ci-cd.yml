name: Deploy Logistics

on:
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (EC2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare frontend (static)
        run: |
          test -f frontend/logistics_staff_portal.html
          test -f frontend/logistics_tracking_page.html
      
      - name: Prepare backend (basic checks)
        run: |
          test -f backend/requirements.txt
          test -f backend/app/main.py

      - name: Upload frontend folder (keep structure)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "frontend"
          target: "${{ secrets.DEPLOY_PATH }}/_frontend_upload"

      - name: Deploy on server (SSH)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf "%s" "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST="$(printf "%s" "$DEPLOY_HOST" | tr -d '\r\n' | xargs)"
          USER="$(printf "%s" "$DEPLOY_USER" | tr -d '\r\n' | xargs)"
          APP_PATH="$(printf "%s" "$DEPLOY_PATH" | tr -d '\r\n')"

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 "$USER@$HOST" "APP_DIR='$APP_PATH' bash -s" << 'EOF'
          set -euo pipefail

          APP_DIR="${APP_DIR}"
          BUILD_FRONTEND="$APP_DIR/_frontend_upload/frontend"
          APP_FRONTEND="$APP_DIR/frontend"
          VENV="$APP_DIR/.venv"
          LOG_DIR="$APP_DIR/logs"

          cd "$APP_DIR"
          git fetch origin
          git reset --hard origin/main

          mkdir -p "$LOG_DIR"

          if ! command -v python3 >/dev/null 2>&1; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-venv python3-pip
          fi

          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
          fi
          source "$VENV/bin/activate"

          REQ_HASH_FILE="$VENV/requirements.sha256"
          NEW_HASH="$(sha256sum backend/requirements.txt | awk '{print $1}')"
          if [ ! -f "$REQ_HASH_FILE" ] || [ "$(cat "$REQ_HASH_FILE")" != "$NEW_HASH" ]; then
            pip install -q -r backend/requirements.txt
            echo "$NEW_HASH" > "$REQ_HASH_FILE"
          fi

          test -f "$BUILD_FRONTEND/logistics_staff_portal.html"
          test -f "$BUILD_FRONTEND/logistics_tracking_page.html"

          mkdir -p "$APP_FRONTEND"
          rsync -a --delete "$BUILD_FRONTEND/" "$APP_FRONTEND/"

          pkill -f "uvicorn app.main:app" || true
          cd "$APP_DIR/backend"
          setsid "$VENV/bin/uvicorn" app.main:app --host 0.0.0.0 --port 8000 > "$LOG_DIR/backend.log" 2>&1 < /dev/null &

          pkill -f "python3 -m http.server 5500" || true
          setsid python3 -m http.server 5500 --directory "$APP_FRONTEND" > "$LOG_DIR/frontend.log" 2>&1 < /dev/null &
          EOF
