name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile check
        run: python -m compileall backend

      # Enable later if you add tests
      # - name: Run tests
      #   run: pytest


  frontend:
    name: Frontend (Static)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check
        run: |
          node -e "
          const fs=require('fs');
          const path=require('path');
          const dir='frontend';
          for(const f of fs.readdirSync(dir)){
            if(f.endsWith('.js')){
              const code=fs.readFileSync(path.join(dir,f),'utf8');
              new Function(code);
              console.log('OK',f);
            }
          }"

      - name: HTML presence check
        run: |
          ls -la frontend/*.html


  deploy:
    name: Deploy (EC2)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          timeout: 30m
          command_timeout: 30m
          request_pty: false

          script: |
            set -e

            echo "Moving to project directory"
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Pull latest code"
            git pull origin main

            echo "Check Python installation"
            if ! command -v python3 >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y python3 python3-venv python3-pip
            fi

            echo "Create virtual environment if missing"
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate

            echo "Install backend dependencies"
            pip install -q -r backend/requirements.txt

            echo "Restart FastAPI server"
            if pgrep -f "uvicorn app.main:app"; then
              pkill -f "uvicorn app.main:app"
              sleep 2
            fi

            nohup .venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8000 \
              > backend.log 2>&1 &

            echo "Restart frontend static server"
            if pgrep -f "http.server 5500"; then
              pkill -f "http.server 5500"
              sleep 2
            fi

            nohup python3 -m http.server 5500 \
              --directory frontend \
              > frontend.log 2>&1 &

            echo "Deployment completed successfully"
