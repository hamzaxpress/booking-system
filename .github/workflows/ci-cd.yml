name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Compile check
        run: python -m compileall backend

      # If you add tests later, enable the next step:
      # - name: Run tests
      #   run: python -m pytest -q

  frontend:
    name: Frontend (Static)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS syntax check
        run: |
          node -e "const fs=require('fs');const path=require('path');const dir='frontend';for (const f of fs.readdirSync(dir)) {if (f.endsWith('.js')) {const code=fs.readFileSync(path.join(dir,f),'utf8');new Function(code);console.log('OK', f);}}"

      - name: HTML presence check
        run: |
          ls -la frontend/*.html

  deploy:
    name: Deploy (Optional)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

